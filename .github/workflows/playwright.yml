name: Playwright Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Install Chromium Browser
        run: npx playwright install chromium --with-deps

      - name: Clean Previous Reports
        run: |
          rm -rf monocart-report
          rm -rf playwright-report
          rm -rf test-results

      - name: Execute Playwright Tests
        id: tests
        run: npx playwright test
        continue-on-error: true

      - name: Add Run Metadata To Monocart Report
        if: always()
        run: |
          mkdir -p monocart-report

          cat > monocart-report/run-info.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Run Info</title>
            </head>
            <body>
              <h1>Assessment Framework Report</h1>
              <p><strong>Run ID:</strong> ${{ github.run_id }}</p>
              <p><strong>Run Number:</strong> ${{ github.run_number }}</p>
              <p><strong>Commit:</strong> ${{ github.sha }}</p>
              <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
              <p><strong>Triggered By:</strong> ${{ github.actor }}</p>
              <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            </body>
          </html>
          EOF

      - name: Verify Monocart Report
        if: always()
        run: |
          echo "Checking Monocart report output..."
          ls -la
          ls -la monocart-report || true
          test -f monocart-report/index.html

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Publish Monocart Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: monocart-report

      - name: Deploy Report
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Assessment Framework Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Monocart Report" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Metadata" >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "Run Number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "Playwright outcome: ${{ steps.tests.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1