name: Playwright Test Suites

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Select test suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - api
          - all

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Install Chromium Browser
        run: npx playwright install chromium --with-deps

      - name: Execute Selected Test Suite
        id: tests
        run: |
          if [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
            npm run test:smoke
          elif [ "${{ github.event.inputs.suite }}" = "regression" ]; then
            npm run test:regression
          elif [ "${{ github.event.inputs.suite }}" = "api" ]; then
            npm run test:api:ci
          elif [ "${{ github.event.inputs.suite }}" = "all" ]; then
            npm test
          else
            echo "Invalid suite selected"
            exit 1
          fi
        continue-on-error: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event.inputs.suite }}
          path: playwright-report

      - name: Publish Monocart Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: monocart-report

      - name: Deploy Report
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Workflow Summary
        if: always()
        run: |
          echo "## Assessment Framework Execution" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Selected Suite" >> $GITHUB_STEP_SUMMARY
          echo "${{ github.event.inputs.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Live Monocart Report" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "Playwright outcome: ${{ steps.tests.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1